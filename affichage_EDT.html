<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Résultats en Direct - EDT</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    :root{
      /* Scrollbar width (JS) */
      --sbw: 12px;

      /* 🎯 Thème Moderne / Sport Dynamique */
      --bg1:#0b1220;         /* nuit */
      --bg2:#0f1a33;         /* nuit + */
      --text:#eaf0ff;        /* texte */
      --muted:#a9b6d6;       /* texte secondaire */

      --primary:#4f7cff;     /* bleu sport */
      --accent:#7c3aed;      /* violet énergie */

      --danger:#ef4444;
      --danger2:#fb7185;

      --card:#0f1a30cc;      /* verre */
      --stroke:#223055;

      --whiteCard: rgba(255,255,255,0.97);   /* conteneur principal clair */
      --whiteCard2: rgba(244,247,255,0.97);  /* variante */
      --ink:#0b1220;         /* texte sur fond clair */

      --gold:#fbbf24;
      --silver:#cbd5e1;
      --bronze:#fb7185;
    }

    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(79,124,255,.35), transparent 55%),
        radial-gradient(900px 500px at 85% 0%, rgba(124,58,237,.30), transparent 55%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container{
      padding: 0;
      max-width: 100%;
      margin: 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* 🎨 HEADER MODERNE CLAIR */
    .header{
      position: relative;
      text-align: center;
      padding: 18px 30px;
      background: linear-gradient(135deg, #4f7cff 0%, #7c3aed 50%, #4f7cff 100%);
      overflow: hidden;
      animation: fadeIn 1s;
    }

    /* Reflet lumineux */
    .header::before{
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(800px 120px at 50% -20%, rgba(255,255,255,0.25), transparent 70%);
      z-index: 1;
    }

    /* Trait lumineux bas */
    .header::after{
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      z-index: 2;
    }

    .header > *{
      position: relative;
      z-index: 3;
    }

    .header h1{
      font-size: 2em;
      margin-bottom: 6px;
      font-weight: 950;
      letter-spacing: 2px;
      color: white;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3);
    }

    @keyframes textGlow{
      0%, 100% {
        filter: drop-shadow(0 0 10px rgba(79,124,255,0.35))
                drop-shadow(0 0 18px rgba(124,58,237,0.25));
      }
      50% {
        filter: drop-shadow(0 0 14px rgba(79,124,255,0.5))
                drop-shadow(0 0 26px rgba(124,58,237,0.35));
      }
    }

    .header .competition-name{
      font-size: 1.1em;
      color: #ffffff;
      text-shadow: 1px 1px 6px rgba(0,0,0,0.5);
      margin-bottom: 5px;
      font-weight: 700;
      letter-spacing: 0.5px;
      opacity: 0.95;
    }

    .header .date{
      font-size: 0.85em;
      color: rgba(234,240,255,0.85);
      font-weight: 500;
    }

    .header .live-indicator{
      display: inline-block;
      padding: 5px 14px;
      background: linear-gradient(135deg, var(--danger), var(--danger2));
      border-radius: 30px;
      margin-top: 8px;
      font-weight: 800;
      font-size: 0.78em;
      animation: pulse 2s infinite;
      box-shadow: 0 0 12px rgba(239,68,68,0.45);
      border: 1px solid rgba(255,255,255,0.25);
      letter-spacing: 0.4px;
    }

    .view-selector{
      text-align: center;
      margin-bottom: 20px;
      overflow-x: auto;
      padding: 20px 0;
    }

    .view-tabs{
      display: inline-flex;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50px;
      padding: 8px;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      box-shadow: 0 10px 34px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    .view-tab{
      padding: 12px 24px;
      border: none;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      border-radius: 50px;
      font-size: 1em;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .view-tab.active{
      background: linear-gradient(135deg, rgba(79,124,255,0.35), rgba(124,58,237,0.25));
      font-weight: 900;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.18);
    }

    .view-tab:hover{
      background: rgba(255,255,255,0.18);
      transform: translateY(-2px);
    }

    .ranking-container{
      background: linear-gradient(135deg, var(--whiteCard), var(--whiteCard2));
      border-radius: 20px;
      padding: 22px;
      box-shadow:
        0 15px 50px rgba(0,0,0,0.3),
        0 0 0 1px rgba(255,255,255,0.08);
      animation: slideIn 0.5s;
      flex: 1;
      margin: 12px 16px 0 16px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(79,124,255,0.18);
      display: flex;
      flex-direction: column;
    }

    .ranking-title{
      font-size: 1.8em;
      color: var(--ink);
      text-align: center;
      margin-bottom: 18px;
      padding-bottom: 12px;
      font-weight: 900;
      letter-spacing: 0.5px;
      position: relative;
    }

    .ranking-title::after{
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--accent), transparent);
      border-radius: 2px;
    }

    /* Mode TV : on masque les onglets de catégories */
    .view-selector{ display:none !important; }

    /* =========================
       ✅ ALIGNEMENT PAR GRILLE (anti-décalage)
       ========================= */
    .ranking-grid{
      --col-rank: 65px;
      --col-club: 180px;
      --col-score: 150px;
      --sbw: 0px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .grid-head{
      display: grid;
      grid-template-columns: var(--col-rank) 1fr var(--col-club) var(--col-score);
      gap: 0;
      align-items: center;
      width: calc(100% - var(--sbw));
      margin-bottom: 8px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      border: 1px solid rgba(79,124,255,0.18);
    }

    .grid-head .hcell{
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      padding: 11px 12px;
      font-size: 0.88em;
      font-weight: 900;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      white-space: nowrap;
      display:flex;
      align-items:center;
    }
    .grid-head .hcell:nth-child(1){ justify-content:center; }
    .grid-head .hcell:nth-child(2){ justify-content:flex-start; padding-left: 26px; }
    .grid-head .hcell:nth-child(3){ justify-content:center; }
    .grid-head .hcell:nth-child(4){ justify-content:center; }

    .grid-scroll{
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
      scrollbar-gutter: stable;
    }

    .grid-scroll::-webkit-scrollbar{ width: 12px; }
    .grid-scroll::-webkit-scrollbar-thumb{
      background: linear-gradient(135deg, rgba(79,124,255,0.55), rgba(124,58,237,0.55));
      border-radius: 10px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    .grid-scroll::-webkit-scrollbar-thumb:hover{
      background: linear-gradient(135deg, rgba(79,124,255,0.75), rgba(124,58,237,0.75));
      background-clip: padding-box;
    }
    .grid-scroll::-webkit-scrollbar-track{
      background: rgba(15,26,51,0.08);
      border-radius: 10px;
      margin: 5px;
    }

    .grid-row{
      display: grid;
      grid-template-columns: var(--col-rank) 1fr var(--col-club) var(--col-score);
      align-items: center;
      gap: 0;
      margin: 0 0 7px 0;
      padding: 0;
      background: linear-gradient(135deg, rgba(79,124,255,0.06), rgba(124,58,237,0.04));
      border-radius: 10px;
      position: relative;
      transition: all 0.28s ease;
      animation: fadeInRow 0.6s;
      border: 1px solid rgba(15,26,51,0.08);
    }

    .grid-row::before{
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(79,124,255,0.10), rgba(124,58,237,0.08), transparent);
      opacity: 0;
      transition: opacity 0.28s ease;
      border-radius: 15px;
      pointer-events: none;
    }

    .grid-row:hover{
      background: linear-gradient(135deg, rgba(79,124,255,0.10), rgba(124,58,237,0.08));
      transform: translateX(6px) scale(1.01);
      box-shadow:
        0 10px 26px rgba(0,0,0,0.14),
        0 0 0 2px rgba(79,124,255,0.16);
    }
    .grid-row:hover::before{ opacity: 1; }

    .cell{
      padding: 11px 10px;
      color: #111827;
      font-size: 0.95em;
      z-index: 1;
    }

    .cell.rank{
      text-align: center;
      font-weight: 950;
      font-size: 1.3em;
      color: var(--ink);
    }

    .cell.tireur{ padding-left: 16px; }

    .cell.club{ text-align: center; }

    .cell.score{ text-align: center; }

    /* Podium look sur le rang */
    .grid-row.rank-1 .cell.rank{ color: var(--gold); text-shadow: 0 0 10px rgba(251,191,36,0.5); font-size: 1.6em; }
    .grid-row.rank-2 .cell.rank{ color: var(--silver); text-shadow: 0 0 8px rgba(203,213,225,0.5); font-size: 1.45em; }
    .grid-row.rank-3 .cell.rank{ color: var(--bronze); text-shadow: 0 0 8px rgba(251,113,133,0.4); font-size: 1.4em; }

    .shooter-name{
      font-weight: 900;
      font-size: 0.95em;
      color: #0b1220;
    }

    .shooter-club{
      color: #475569;
      font-size: 0.78em;
      margin-top: 3px;
      font-weight: 600;
    }

    .category-badge{
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.86em;
      font-weight: 850;
      margin-left: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.10);
      border: 1px solid rgba(15,26,51,0.12);
      color: #0b1220;
    }

    /* Catégories (conservées mais plus "sport" / contrastées) */
    .category-Poussin-Garçon { background: linear-gradient(135deg, #93c5fd, #60a5fa); color:#0b1220; }
    .category-Poussin-Fille  { background: linear-gradient(135deg, #fda4af, #fb7185); color:#0b1220; }
    .category-Benjamin-Garçon{ background: linear-gradient(135deg, #a5b4fc, #818cf8); color:#0b1220; }
    .category-Benjamin-Fille { background: linear-gradient(135deg, #f9a8d4, #f472b6); color:#0b1220; }
    .category-Minime-Garçon  { background: linear-gradient(135deg, #67e8f9, #22d3ee); color:#0b1220; }
    .category-Minime-Fille   { background: linear-gradient(135deg, #fecaca, #fda4af); color:#0b1220; }
    .category-Cadet-Garçon   { background: linear-gradient(135deg, #86efac, #22c55e); color:#0b1220; }
    .category-Cadet-Fille    { background: linear-gradient(135deg, #fde68a, #fbbf24); color:#0b1220; }
    .category-Junior-Garçon  { background: linear-gradient(135deg, #a7f3d0, #34d399); color:#0b1220; }
    .category-Junior-Fille   { background: linear-gradient(135deg, #fbcfe8, #f472b6); color:#0b1220; }

    .category-Senior   { background: linear-gradient(135deg, #c7d2fe, #93c5fd); color:#0b1220; }
    .category-Dame     { background: linear-gradient(135deg, #fda4af, #fb7185); color:#0b1220; }
    .category-Senior-2 { background: linear-gradient(135deg, #ddd6fe, #a5b4fc); color:#0b1220; }
    .category-Senior-3 { background: linear-gradient(135deg, #e2e8f0, #cbd5e1); color:#0b1220; }
    .category-Dame-2   { background: linear-gradient(135deg, #fecaca, #fca5a5); color:#0b1220; }
    .category-Dame-3   { background: linear-gradient(135deg, #fbcfe8, #f9a8d4); color:#0b1220; }

    .score-display{
      font-size: 1.5em;
      font-weight: 950;
      color: var(--ink);
    }

    .score-max{
      font-size: 0.9em;
      color: #64748b;
      font-weight: 600;
    }

    .empty-state{
      text-align: center;
      padding: 100px 20px;
      color: #64748b;
    }

    .empty-state svg{
      width: 180px;
      height: 180px;
      margin-bottom: 25px;
      opacity: 0.20;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,0.12));
    }

    .empty-state h2{
      font-size: 2.2em;
      margin-bottom: 12px;
      color: #475569;
      font-weight: 900;
    }

    .footer{
      text-align: center;
      padding: 4px 16px 6px;
      color: rgba(234,240,255,0.45);
      font-size: 0.72em;
    }

    .auto-rotate-indicator{
      text-align: center;
      margin-top: 0;
      padding: 3px 0;
      color: rgba(234,240,255,0.45);
      font-size: 0.72em;
      font-weight: 500;
      padding: 12px 20px;
      background: rgba(255,255,255,0.10);
      border-radius: 25px;
      margin-left: 30px;
      margin-right: 30px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 8px 26px rgba(0,0,0,0.18);
    }

    @keyframes fadeIn{
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn{
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInRow{
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes pulse{
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.85; transform: scale(1.05); }
    }

    @media (max-width: 768px){
      .header h1 { font-size: 2.6em; }
      .header .competition-name { font-size: 1.35em; }
      .ranking-title { font-size: 2em; }
      .view-tabs { flex-wrap: wrap; }
      .view-tab { font-size: 0.9em; padding: 10px 18px; }
      .ranking-container { padding: 25px; margin: 20px; }

      /* on réduit un peu les colonnes en mobile */
      .ranking-grid{
        --col-rank: 70px;
        --col-club: 160px;
        --col-score: 160px;
      }
    }

    /* =========================
       MODE ADAPTATIF AUTO
       ========================= */
    body.mobile-mode .tv-footer { display: none; }

    body.mobile-mode .ranking-title{
      font-size: 1.6rem;
      text-align: center;
    }

    body.mobile-mode .grid-row{
      grid-template-columns: 60px 1fr 80px;
      padding: 12px;
    }

    body.mobile-mode .cell.rank{ font-size: 1.4rem; }

    body.mobile-mode .cell.name{ font-size: 1.1rem; }

    body.mobile-mode .cell.score{
      font-size: 1.3rem;
      font-weight: bold;
    }

    body.mobile-mode .grid-head{
      grid-template-columns: 60px 1fr 80px;
      font-size: 0.9rem;
    }

    /* ✅ correction : body.mobile-mode body -> body.mobile-mode */
    body.mobile-mode { padding: 10px; }

    body.tv-mode .ranking-title{ font-size: 2.5rem; }
    body.tv-mode .cell.score{ font-size: 2rem; }
  </style>
</head>

<script>
(function() {
  const width = window.innerWidth;

  if (width <= 768) {
    document.body.classList.add("mobile-mode");
  } else if (width >= 1200) {
    document.body.classList.add("tv-mode");
  }
})();
</script>

<body>
  <div class="container">
    <div class="header">
      <h1>🎯 Résultats</h1>
      <div class="competition-name" id="competitionName">Chargement...</div>
      <div class="date" id="competitionDate"></div>
      <div class="live-indicator">🔴 EN DIRECT</div>
    </div>

    <!-- (Onglets cachés en mode TV, laissés en place si tu veux les réactiver plus tard) -->
    <div class="view-selector">
      <div class="view-tabs" id="viewTabs">
        <button class="view-tab active" onclick="changeView('general')">Général</button>
        <button class="view-tab" onclick="changeView('Poussin Garçon')">Poussin G</button>
        <button class="view-tab" onclick="changeView('Poussin Fille')">Poussin F</button>
        <button class="view-tab" onclick="changeView('Benjamin Garçon')">Benjamin G</button>
        <button class="view-tab" onclick="changeView('Benjamin Fille')">Benjamin Fille</button>
        <button class="view-tab" onclick="changeView('Minime Garçon')">Minime G</button>
        <button class="view-tab" onclick="changeView('Minime Fille')">Minime F</button>
        <button class="view-tab" onclick="changeView('Cadet Garçon')">Cadet G</button>
        <button class="view-tab" onclick="changeView('Cadet Fille')">Cadet F</button>
        <button class="view-tab" onclick="changeView('Junior Garçon')">Junior G</button>
        <button class="view-tab" onclick="changeView('Junior Fille')">Junior F</button>
        <button class="view-tab" onclick="changeView('Senior')">Senior</button>
        <button class="view-tab" onclick="changeView('Dame')">Dame</button>
        <button class="view-tab" onclick="changeView('Senior 2')">Senior 2</button>
        <button class="view-tab" onclick="changeView('Senior 3')">Senior 3</button>
        <button class="view-tab" onclick="changeView('Dame 2')">Dame 2</button>
        <button class="view-tab" onclick="changeView('Dame 3')">Dame 3</button>
      </div>
    </div>

    <div class="ranking-container" id="rankingContainer"></div>
    <div class="auto-rotate-indicator" id="autoRotateIndicator"></div>

    <div class="footer">
      Mise à jour automatique en temps réel • Dernière mise à jour : <span id="lastUpdate">-</span>
    </div>
  </div>

  <script>
    // ✅ DÉTECTION DE LA COMPÉTITION VIA URL
   function getCompetitionId() {
  const params = new URLSearchParams(window.location.search);
  const comp = (params.get('comp') || 'default').trim();
  return `EDT/${comp}`;
}
    const COMPETITION_ID = getCompetitionId();

    // ✅ Mesure largeur scrollbar pour aligner bandeau / lignes (Mac/Windows)
    function setScrollbarWidthVar(){
      const outer = document.createElement('div');
      outer.style.visibility = 'hidden';
      outer.style.overflow = 'scroll';
      outer.style.msOverflowStyle = 'scrollbar';
      outer.style.width = '100px';
      outer.style.position = 'absolute';
      outer.style.top = '-9999px';
      document.body.appendChild(outer);

      const inner = document.createElement('div');
      inner.style.width = '100%';
      outer.appendChild(inner);

      const sbw = outer.offsetWidth - inner.offsetWidth;
      document.documentElement.style.setProperty('--sbw', (sbw || 12) + 'px');
      outer.remove();
    }

    document.addEventListener('DOMContentLoaded', setScrollbarWidthVar);
    window.addEventListener('resize', setScrollbarWidthVar);

    // ⚠️ CONFIGURATION FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyAvfMRtRrhh_e-27xHlwIx9c5DIdUQm6HM",
      authDomain: "resultats-tir-ligue-lr.firebaseapp.com",
      databaseURL: "https://resultats-tir-ligue-lr-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "resultats-tir-ligue-lr",
      storageBucket: "resultats-tir-ligue-lr.firebasestorage.app",
      messagingSenderId: "468808300974",
      appId: "1:468808300974:web:563a14cc4477c10b28303f"
    };

    // Firebase
    let database;
    let shootersRef;
    let configRef;

    // Données
    let allShooters = [];
    let competitionConfig = {};

    // Vue courante
    let currentView = { mode:'disc_general', discipline:'' };

    // Mode TV : rotation auto Discipline -> Catégorie + défilement
    let autoRotateEnabled = true;
    const perViewSeconds = 8;         // ✅ demandé : 8s
    const scrollPaddingSeconds = 2;
    let rotateTimer = null;
    let scrollTimer = null;
    let rotateViews = [];
    let currentRotateIndex = 0;

    function normalizeKey(s){ return (s || '').toString().trim(); }

    function buildRotateViews() {
      const map = new Map(); // discipline -> Set(categories)

      allShooters.forEach(s => {
        const d = normalizeKey(s.discipline);
        const c = normalizeKey(s.category);
        if (!d) return;
        if (!map.has(d)) map.set(d, new Set());
        if (c) map.get(d).add(c);
      });

      const disciplines = Array.from(map.keys()).sort((a,b)=>a.localeCompare(b,'fr',{sensitivity:'base'}));
      const views = [];

      disciplines.forEach(d => {
        const cats = Array.from(map.get(d) || []).sort((a,b)=>a.localeCompare(b,'fr',{sensitivity:'base'}));

        if (!cats.length) {
          views.push({ mode:'disc_only', discipline:d });
        } else {
          cats.forEach(c => views.push({ mode:'combo', discipline:d, category:c }));
        }
      });

      if (!views.length) views.push({ mode:'disc_only', discipline:'Résultats' });
      return views;
    }

    function viewLabel(view){
      if (view.mode === 'combo') return `${view.discipline} • ${view.category}`;
      if (view.mode === 'disc_only') return `${view.discipline}`;
      if (view.mode === 'category') return `Classement ${view.category}`;
      return 'Classement';
    }

    function setActiveTab(view){
      document.querySelectorAll('.view-tab').forEach(tab => tab.classList.remove('active'));
      const tabs = Array.from(document.querySelectorAll('.view-tab'));

      if (view.mode === 'disc_general') {
        const t = tabs.find(x => x.textContent.trim() === 'Général');
        if (t) t.classList.add('active');
        return;
      }

      if (view.mode === 'category') {
        const t = tabs.find(x => (x.getAttribute('onclick') || '').includes(view.category));
        if (t) t.classList.add('active');
        return;
      }
    }

    // Connexion Firebase
    try{
      firebase.initializeApp(firebaseConfig);
      // ✅ Auth anonyme obligatoire pour lire les données (règles Firebase)
      firebase.auth().signInAnonymously().catch(e => console.warn('Auth anonyme échouée:', e));
      database = firebase.database();

      shootersRef = database.ref(`${COMPETITION_ID}/shooters`);
      configRef = database.ref(`${COMPETITION_ID}/config`);

      configRef.on('value', (snapshot) => {
        competitionConfig = snapshot.val() || {};
        document.getElementById('competitionName').textContent = competitionConfig.name || 'Compétition de Tir';

        if (competitionConfig.date) {
          const date = new Date(competitionConfig.date);
          document.getElementById('competitionDate').textContent = date.toLocaleDateString('fr-FR', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
          });
        } else {
          document.getElementById('competitionDate').textContent = '';
        }
      });

      shootersRef.on('value', (snapshot) => {
        const shootersData = snapshot.val();
        if (shootersData) {
          allShooters = Object.entries(shootersData)
            .map(([id, data]) => ({ id, ...data }))
            .sort((a, b) => (Number(b.score) || 0) - (Number(a.score) || 0));
        } else {
          allShooters = [];
        }

        rotateViews = buildRotateViews();
        if (currentRotateIndex >= rotateViews.length) currentRotateIndex = 0;

        if (!currentView || !currentView.mode || (currentView.mode === 'disc_general' && !normalizeKey(currentView.discipline))) {
          currentView = rotateViews[0] || { mode:'disc_general', discipline:'Résultats' };
        }

        displayRanking(currentView);
        updateLastUpdate();

        if (autoRotateEnabled) startAutoRotate();
      });

    } catch (error) {
      console.error('Erreur Firebase:', error);
      document.getElementById('rankingContainer').innerHTML = `
        <div class="empty-state">
          <h2>❌ Erreur de connexion</h2>
          <p>Impossible de se connecter à Firebase</p>
          <p style="font-size: 0.9em; margin-top: 10px;">Vérifiez la configuration dans le code source</p>
        </div>
      `;
    }

    function changeView(view){
      if (view === 'general') {
        const firstDisc = normalizeKey(allShooters[0]?.discipline) || 'Résultats';
        currentView = { mode:'disc_general', discipline:firstDisc };
      } else {
        currentView = { mode:'category', category:view };
      }

      setActiveTab(currentView);
      stopAutoRotate();
      displayRanking(currentView);

      setTimeout(() => {
        if (autoRotateEnabled) startAutoRotate();
      }, 30000);
    }

    function stopAutoScroll(){
      if (scrollTimer) { clearInterval(scrollTimer); scrollTimer = null; }
    }

    function startAutoScroll(){
      stopAutoScroll();

      const scroller = document.getElementById('tableScroll');
      if (!scroller) return;

      scroller.scrollTop = 0;

      const startDelay = scrollPaddingSeconds * 0;
      const endPause = scrollPaddingSeconds * 1000;

      let startAt = Date.now() + startDelay;

      scrollTimer = setInterval(() => {
        if (!autoRotateEnabled) return;

        const now = Date.now();
        if (now < startAt) return;

        const maxScroll = scroller.scrollHeight - scroller.clientHeight;
        if (maxScroll <= 0) return;

        const travelMs = Math.max(1000, (perViewSeconds * 1000) - (2 * scrollPaddingSeconds * 1000));
        const pxPerTick = maxScroll / (travelMs / 30);

        scroller.scrollTop = Math.min(maxScroll, scroller.scrollTop + pxPerTick);

        if (scroller.scrollTop >= maxScroll - 2) {
          stopAutoScroll();
          setTimeout(() => {
            if (autoRotateEnabled) goNextView();
          }, endPause);
        }
      }, 30);
    }

    function goNextView(){
      if (!rotateViews.length) return;

      currentRotateIndex = (currentRotateIndex + 1) % rotateViews.length;
      currentView = rotateViews[currentRotateIndex];

      setActiveTab(currentView);
      displayRanking(currentView);
      updateRotateIndicator();
    }

    function startAutoRotate(){
      stopAutoRotate();

      if (!rotateViews.length) rotateViews = [{ mode:'disc_only', discipline:'Résultats' }];
      if (!currentView || !currentView.mode) currentView = rotateViews[0];

      displayRanking(currentView);
      updateRotateIndicator();

      rotateTimer = setInterval(() => {
        if (!autoRotateEnabled) return;
        const scroller = document.getElementById('tableScroll');
        if (scroller && scroller.scrollHeight > scroller.clientHeight) return;
        goNextView();
      }, perViewSeconds * 1000);

      startAutoScroll();
    }

    function stopAutoRotate(){
      if (rotateTimer) { clearInterval(rotateTimer); rotateTimer = null; }
      stopAutoScroll();
      document.getElementById('autoRotateIndicator').textContent = '';
    }

    function updateRotateIndicator(){
      if (!autoRotateEnabled) return;
      const next = rotateViews[(currentRotateIndex + 1) % (rotateViews.length || 1)] || { mode:'disc_general', discipline:'Résultats' };
      document.getElementById('autoRotateIndicator').textContent =
        `↻ Mode TV • Défilement automatique • Prochaine vue : ${viewLabel(next)} (≈ ${perViewSeconds}s)`;
    }

    function displayRanking(view){
      const container = document.getElementById('rankingContainer');

      if (!allShooters.length) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/>
            </svg>
            <h2>Aucun résultat pour le moment</h2>
            <p>Les résultats s'afficheront dès qu'ils seront saisis</p>
          </div>
        `;
        return;
      }

      if (view.mode === 'disc_general' && !normalizeKey(view.discipline)) {
        const firstDisc = normalizeKey(allShooters[0]?.discipline) || 'Résultats';
        view = { mode:'disc_general', discipline:firstDisc };
      }

      let filteredShooters = allShooters;
      let title = '';

      if (view.mode === 'combo') {
        filteredShooters = allShooters.filter(s =>
          normalizeKey(s.discipline) === normalizeKey(view.discipline) &&
          normalizeKey(s.category) === normalizeKey(view.category)
        );
        title = `${view.discipline} • ${view.category}`;

      } else if (view.mode === 'disc_only') {
        filteredShooters = allShooters.filter(s =>
          normalizeKey(s.discipline) === normalizeKey(view.discipline)
        );
        title = `${view.discipline}`;

      } else if (view.mode === 'category') {
        filteredShooters = allShooters.filter(s =>
          normalizeKey(s.category) === normalizeKey(view.category)
        );
        title = `Classement ${view.category}`;
      }

      if (!filteredShooters.length) {
        container.innerHTML = `
          <div class="empty-state">
            <h2>Aucun tireur pour : ${title}</h2>
          </div>
        `;
        return;
      }

      let html = `<div class="ranking-title">${title}</div>`;

      html += `
        <div class="ranking-grid" id="rankingGrid">
          <div class="grid-head" id="gridHead">
            <div class="hcell">#</div>
            <div class="hcell">Tireur</div>
            <div class="hcell">Club</div>
            <div class="hcell">Score</div>
          </div>

          <div class="grid-scroll" id="tableScroll">
      `;

      filteredShooters.forEach((shooter, index) => {
        const rankClass = index < 3 ? `rank-${index + 1}` : '';
        const categoryClass = 'category-' + (shooter.category || '').replace(/ /g, '-');

        const showCategoryBadge = (view.mode === 'disc_only');
        const showDisciplineBadge = (view.mode === 'category');

        html += `
          <div class="grid-row ${rankClass}">
            <div class="cell rank">${index + 1}</div>
            <div class="cell tireur">
              <div class="shooter-name">${shooter.firstName || ''} ${shooter.lastName || ''}</div>
              ${showCategoryBadge ? `<span class="${categoryClass} category-badge">${shooter.category || ''}</span>` : ''}
              ${showDisciplineBadge ? `<span class="category-badge" style="background:linear-gradient(135deg, rgba(79,124,255,0.18), rgba(124,58,237,0.14)); color:#0b1220; border:1px solid rgba(15,26,51,0.12);">${shooter.discipline || ''}</span>` : ''}
            </div>
            <div class="cell club"><div class="shooter-club">${shooter.club || ''}</div></div>
            <div class="cell score">
              <span class="score-display">${shooter.score}</span>
              <span class="score-max">/ ${shooter.maxScore}</span>
            </div>
          </div>
        `;
      });

      html += `
          </div>
        </div>
      `;
      container.innerHTML = html;

      const scroller = document.getElementById('tableScroll');
      const grid = document.getElementById('rankingGrid');
      if (scroller && grid){
        const sbw = Math.max(0, scroller.offsetWidth - scroller.clientWidth);
        grid.style.setProperty('--sbw', sbw + 'px');
      }

      if (autoRotateEnabled) startAutoScroll();
    }

    function updateLastUpdate(){
      const now = new Date();
      document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('fr-FR');
    }

    // Plein écran au double-clic
    document.addEventListener('dblclick', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });

    // Espace = pause / reprise rotation
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        autoRotateEnabled = !autoRotateEnabled;
        if (autoRotateEnabled) {
          startAutoRotate();
        } else {
          stopAutoRotate();
          document.getElementById('autoRotateIndicator').textContent =
            '⏸ Mode TV en pause (appuyez sur Espace pour reprendre)';
        }
      }
    });
  </script>
</body>
</html>
